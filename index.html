<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>امارتي تحبيني؟ 💗</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Tajawal", sans-serif;
            background: #ffd6e8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        #question {
            font-size: 22px;
            font-weight: bold;
            color: #d81b60;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .yes {
            background: #f06292;
            color: white;
        }

        .no {
            background: #ffebf3;
            color: #d81b60;
        }

        button:hover {
            transform: scale(1.03);
        }

        .hidden {
            display: none;
        }

        .final-msg {
            font-size: 26px;
            font-weight: bold;
            color: #c2185b;
        }
    </style>
</head>
<body>

<div class="box" id="main">
    <div id="question">امارتي تحبيني؟ 💕</div>

    <button class="yes" id="yesBtn">اي</button>
    <button class="no" id="noBtn">لا</button>
</div>

<div class="box hidden" id="lastPage">
    <div class="final-msg">انجبي انا احبج اكثر يلا روحي ❤️</div>
</div>

<script>
    const question = document.getElementById("question");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const main = document.getElementById("main");
    const lastPage = document.getElementById("lastPage");

    let noClick = 0;

    // زر لا
    noBtn.onclick = () => {
        noClick++;
        if (noClick === 1) {
            question.textContent = "اخخ ليش ما تحبيني 😢";
        } else if (noClick === 2) {
            question.textContent = "خرب ليش هيج حبينييي 😭";
        } else {
            question.textContent = "كافي عاد يلا حبيني 😤💕";
        }
    };

    // زر اي
    yesBtn.onclick = () => {
        question.textContent = "يروحي واني اموت عليج ❤️";
        yesBtn.classList.add("hidden");
        noBtn.classList.add("hidden");

        const loveBtn = document.createElement("button");
        loveBtn.textContent = "حبيبي 🫢";
        loveBtn.className = "yes";

        const notMeBtn = document.createElement("button");
        notMeBtn.textContent = "ماا انا";
        notMeBtn.className = "no";

        main.appendChild(loveBtn);
        main.appendChild(notMeBtn);

        loveBtn.onclick = () => {
            question.textContent = "بس هااا آني أكثر فهمتي؟ 😏💕";
            loveBtn.remove();
            notMeBtn.remove();

            const lastBtn = document.createElement("button");
            lastBtn.textContent = "لا آنا";
            lastBtn.className = "no";
            main.appendChild(lastBtn);

            lastBtn.onclick = endPage;
        };

        notMeBtn.onclick = () => {
            question.textContent = "آنه؟ 😒";
            notMeBtn.remove();

            const lastBtn = document.createElement("button");
            lastBtn.textContent = "لا آنا";
            lastBtn.className = "no";
            main.appendChild(lastBtn);

            lastBtn.onclick = endPage;
        };
    };

    function endPage() {
        main.classList.add("hidden");
        lastPage.classList.remove("hidden");
    }
</script>

</body>
</html>
